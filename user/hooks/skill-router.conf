# skill-router.conf — keyword → skill mapping (used by skill-router.sh)
#
# Format: extended-regex-pattern|||skill_name|||one-line purpose
# Lines starting with # or blank are ignored.
# Patterns are case-insensitive (the prompt is lowercased before match).
# Use \b for word boundaries to avoid false fires (e.g. "plan\b" not "plan").
#
# Curated to ~35 high-leverage skills covering the user's stack
# (Next.js / NestJS / Go / Postgres / Railway / Docker) plus claude-self
# management. Edit freely — `skill-router.sh` re-reads on every prompt.

# ── Planning & strategy ────────────────────────────────────────────
\b(plan|roadmap|approach|strategy|how should i)\b|||plan|||Multi-step planning before code touches files
\b(brainstorm|brainstorming|ideate|options for)\b|||superpowers:brainstorming|||Open-ended option exploration
\b(autoplan|ceo review|design review|eng review)\b|||autoplan|||Run multi-persona plan review pipeline
\bpair (with|on|program)\b|||pair|||Dispatch parallel Explore + Plan agents

# ── Research & knowledge ───────────────────────────────────────────
\b(research|investigate|deep[ -]dive|look into)\b|||research|||Multi-MCP research: WebFetch+context7+duckduckgo
\b(extract|structured data from|parse)\b.*(url|page|pdf|file)|||extract|||Structured extraction via langextract
\bwiki\b|\b(remember|recall|did we)\b|||wiki|||Search persistent llm-wiki for past notes
\b(learn|capture this insight|save lesson)\b|||learn|||Append insight to llm-wiki dated entry

# ── Debugging & verification ───────────────────────────────────────
\b(debug|stack ?trace|crash|fails?|why (is|does)|broken)\b|||superpowers:systematic-debugging|||Hypothesis-test bugs methodically
\b(verify|sanity check|make sure|did it work)\b|||superpowers:verification-before-completion|||Verify before claiming done
\b(careful|risk|destructive|irreversible)\b|||careful|||Prepend safety warnings before destructive ops

# ── Testing ────────────────────────────────────────────────────────
\b(tdd|test[- ]?driven|red[- ]?green)\b|||superpowers:test-driven-development|||Tight TDD red-green-refactor loop
\b(unit test|test the|write tests?)\b|||tdd-workflow|||General TDD workflow guide
\b(e2e|end[- ]?to[- ]?end|playwright|cypress)\b|||e2e-testing|||End-to-end test patterns

# ── Browser automation ─────────────────────────────────────────────
\b(browser|click|fill form|automate (page|web|site))\b|||playwright-skill|||Direct Playwright fixtures
\b(scrape|crawl|firecrawl)\b|||firecrawl-browser|||Firecrawl scrape + interact (forms, login)
\b(visual qa|ui regression|snapshot|screenshot test)\b|||browser-qa|||Visual QA on deployed features

# ── Frontend / design ──────────────────────────────────────────────
\b(design|ui|ux|figma|polish|redesign)\b|||taste-skill|||Design taste cues for cleaner UI
\b(next\.?js|app router|server component|rsc)\b|||nextjs-turbopack|||Next.js + Turbopack patterns
\b(react|jsx|component|tailwind|shadcn)\b|||frontend-patterns|||React + Tailwind composition patterns
\b(impeccable|distill|arrange|typeset|colorize|animate)\b|||impeccable|||Polish/distill UI artifacts

# ── Backend / data ─────────────────────────────────────────────────
\b(nestjs|nest cli|controller|provider|module)\b|||nestjs-patterns|||NestJS service patterns
\b(go(lang)?|beego|gin|fiber)\b|||golang-patterns|||Go server patterns
\b(prisma|postgres|psql|migration)\b|||postgres-patterns|||Postgres + Prisma patterns
\b(api design|rest|openapi|swagger)\b|||api-design|||API design guidance
\b(mcp server|tool server|model context protocol)\b|||mcp-server-patterns|||Build MCP servers

# ── Ops / deploy ───────────────────────────────────────────────────
\b(railway|deploy|ship)\b|||railway:use-railway|||Railway deploy patterns
\b(docker|container|compose)\b|||docker-patterns|||Docker + compose patterns
\b(github|pull request|pr review|gh cli)\b|||github-ops|||GitHub ops via gh CLI

# ── Git workflow ───────────────────────────────────────────────────
\b(commit|stage|amend)\b|||commit-commands:commit|||Conventional commit message + stage
\b(branch|merge|rebase|cherry[- ]pick)\b|||git-workflow|||Git branching workflow

# ── Memory / context management ────────────────────────────────────
\b(compress|too long|summarize (this|conversation|session))\b|||strategic-compact|||Summarize current session into handoff
\b(retro|retrospective|weekly review)\b|||retro|||Weekly improvement state retrospective
\b(prompt[- ]optim|tighter prompt|rewrite this prompt)\b|||prompt-optimizer|||Tighten + improve prompt phrasing

# ── Skill-creation meta ────────────────────────────────────────────
\b(create (a )?skill|new skill)\b|||skill-creator|||Build a new SKILL.md
\b(unused skills?|prune skills?|skill audit)\b|||skill-stocktake|||Audit + prune skill surface

# ── Wiki/memory output (low-priority — last lines win on dup) ──────
\b(youtube|video transcript|podcast|whisper)\b|||ytdl|||yt-dlp → audio → whisper → wiki
