# skill-router.conf — keyword → skill mapping (used by skill-router.sh)
#
# Format: extended-regex-pattern|||skill_name|||one-line purpose
# Lines starting with # or blank are ignored.
# Patterns are case-insensitive (the prompt is lowercased before match).
# Word boundaries omitted: \b is GNU-only, [[:<:]] is BSD-only, neither portable.
# Accepted false positives (e.g. "plan" matching "explanation") in exchange for hint-only output.
#
# Curated to ~35 high-leverage skills covering the user's stack
# (Next.js / NestJS / Go / Postgres / Railway / Docker) plus claude-self
# management. Edit freely — `skill-router.sh` re-reads on every prompt.

# ── Planning & strategy ────────────────────────────────────────────
(plan|roadmap|approach|strategy|how should i)|||plan|||Multi-step planning before code touches files
(brainstorm|brainstorming|ideate|options for)|||superpowers:brainstorming|||Open-ended option exploration
(autoplan|ceo review|design review|eng review)|||autoplan|||Run multi-persona plan review pipeline
pair (with|on|program)|||pair|||Dispatch parallel Explore + Plan agents

# ── Research & knowledge ───────────────────────────────────────────
(research|investigate|deep[ -]dive|look into)|||research|||Multi-MCP research: WebFetch+context7+duckduckgo
(extract|structured data from|parse).*(url|page|pdf|file)|||extract|||Structured extraction via langextract
wiki|(remember|recall|did we)|||wiki|||Search persistent llm-wiki for past notes
(learn|capture this insight|save lesson)|||learn|||Append insight to llm-wiki dated entry

# ── Debugging & verification ───────────────────────────────────────
(debug|stack ?trace|crash|fails?|why (is|does)|broken)|||superpowers:systematic-debugging|||Hypothesis-test bugs methodically
(verify|sanity check|make sure|did it work)|||superpowers:verification-before-completion|||Verify before claiming done
(careful|risk|destructive|irreversible)|||careful|||Prepend safety warnings before destructive ops

# ── Testing ────────────────────────────────────────────────────────
(tdd|test[- ]?driven|red[- ]?green)|||superpowers:test-driven-development|||Tight TDD red-green-refactor loop
(unit test|test the|write tests?)|||tdd-workflow|||General TDD workflow guide
(e2e|end[- ]?to[- ]?end|playwright|cypress)|||e2e-testing|||End-to-end test patterns

# ── Browser automation ─────────────────────────────────────────────
(browser|click|fill form|automate (page|web|site))|||playwright-skill|||Direct Playwright fixtures
(scrape|crawl|firecrawl)|||firecrawl-browser|||Firecrawl scrape + interact (forms, login)
(visual qa|ui regression|snapshot|screenshot test)|||browser-qa|||Visual QA on deployed features

# ── Frontend / design ──────────────────────────────────────────────
(design|ui|ux|figma|polish|redesign)|||taste-skill|||Design taste cues for cleaner UI
(next\.?js|app router|server component|rsc)|||nextjs-turbopack|||Next.js + Turbopack patterns
(react|jsx|component|tailwind|shadcn)|||frontend-patterns|||React + Tailwind composition patterns
(impeccable|distill|arrange|typeset|colorize|animate)|||impeccable|||Polish/distill UI artifacts

# ── Backend / data ─────────────────────────────────────────────────
(nestjs|nest cli|controller|provider|module)|||nestjs-patterns|||NestJS service patterns
(go(lang)?|beego|gin|fiber)|||golang-patterns|||Go server patterns
(prisma|postgres|psql|migration)|||postgres-patterns|||Postgres + Prisma patterns
(api design|rest|openapi|swagger)|||api-design|||API design guidance
(mcp server|tool server|model context protocol)|||mcp-server-patterns|||Build MCP servers

# ── Ops / deploy ───────────────────────────────────────────────────
(railway|deploy|ship)|||railway:use-railway|||Railway deploy patterns
(docker|container|compose)|||docker-patterns|||Docker + compose patterns
(github|pull request|pr review|gh cli)|||github-ops|||GitHub ops via gh CLI

# ── Git workflow ───────────────────────────────────────────────────
(commit|stage|amend)|||commit-commands:commit|||Conventional commit message + stage
(branch|merge|rebase|cherry[- ]pick)|||git-workflow|||Git branching workflow

# ── Memory / context management ────────────────────────────────────
(compress|too long|summarize (this|conversation|session))|||strategic-compact|||Summarize current session into handoff
(retro|retrospective|weekly review)|||retro|||Weekly improvement state retrospective
(prompt[- ]optim|tighter prompt|rewrite this prompt)|||prompt-optimizer|||Tighten + improve prompt phrasing

# ── Skill-creation meta ────────────────────────────────────────────
(create (a )?skill|new skill)|||skill-creator|||Build a new SKILL.md
(unused skills?|prune skills?|skill audit)|||skill-stocktake|||Audit + prune skill surface

# ── Wiki/memory output (low-priority — last lines win on dup) ──────
(youtube|video transcript|podcast|whisper)|||ytdl|||yt-dlp → audio → whisper → wiki
